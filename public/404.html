<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // SPA for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    //
    // GitHub Pages でビルド後に追加されたページ (例: /nonogram/[新しいuuid]/) への
    // 直接アクセス時に 404 が返される問題を回避するためのリダイレクト。
    // pathSegmentsToKeep:
    //   1 = プロジェクトページ (https://<user>.github.io/<repo>/)
    //   0 = ユーザー/組織ページ or カスタムドメイン (https://<user>.github.io/)
    var pathSegmentsToKeep = 1;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
