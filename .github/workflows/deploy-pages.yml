name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを1つに制限
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          # GitHub Repository Variables で設定する
          # - NEXT_PUBLIC_API_BASE : Flask バックエンドのURL (例: https://solopg.com)
          # - BASE_PATH            : GitHub Pages のパスプレフィックス
          #                          プロジェクトページなら /<リポジトリ名>
          #                          カスタムドメインやユーザーページなら空文字
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE || 'https://solopg.com' }}
          BASE_PATH: ${{ vars.BASE_PATH || '' }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
